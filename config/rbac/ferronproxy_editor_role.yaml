# This rule is not used by the project ferron-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the networking.ferron.sh.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ferron-operator
    app.kubernetes.io/managed-by: kustomize
  name: ferronproxy-editor-role
rules:
- apiGroups:
  - networking.ferron.sh
  resources:
  - ferronproxies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.ferron.sh
  resources:
  - ferronproxies/status
  verbs:
  - get
